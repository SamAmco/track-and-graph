# Track & Graph Knowledge Base Index
# Read this file first to identify relevant docs before opening them.
# Each entry has: file, title, description, keywords

docs:
  - file: project-map.md
    title: Project map — directory structure
    description: Top-level directory layout of the repository — app/app UI module, app/data data module, docs/, lua/, schemas/ — with notes on each folder's purpose.
    keywords: [project-map, directory, structure, modules, app, data, ui, docs, lua, schemas, layout]

  - file: compose-ui-patterns.md
    title: Compose UI patterns — ViewModel binding, pure UI, and previews
    description: The standard three-layer composable pattern — ViewModel-binding composable collects state and calls a pure-UI composable; pure-UI composable takes only state/callbacks; @Preview calls the pure-UI composable with hardcoded data.
    keywords: [compose, composable, preview, ViewModel, pure UI, state, callbacks, pattern, split, dialog, screen, Content, View]

  - file: fab-and-scroll-patterns.md
    title: FAB patterns — scroll-hiding, animation constants, and tracker-only guard
    description: How scroll-hiding FABs work via NestedScrollConnection passed through AppBarConfig.nestedScrollConnection into MainScreen's Scaffold modifier; shared fabEnterTransition/fabExitTransition constants in Animations.kt; tracker-only FAB guard using viewModel.tracker.map { it != null }; FeatureHistoryScreen and GroupScreen as reference implementations.
    keywords: [FAB, scroll, NestedScrollConnection, AppBarConfig, nestedScrollConnection, fabEnterTransition, fabExitTransition, Animations, AnimatedVisibility, tracker, isTracker, showFab, GroupScreen, FeatureHistoryScreen, GroupTopBar, scroll-hide, MutableState]

  - file: architecture.md
    title: Architecture and conventions
    description: MVVM pattern, module structure (app/app UI, app/data data layer), KMP compatibility constraints (no mocking frameworks), Hilt DI, Channel-based UI events, coding conventions, and localization (4 languages — always update all translations).
    keywords: [architecture, MVVM, Hilt, KMP, modules, Room, coroutines, DataInteractor, Channel, conventions, testing, strings, localization, translations, i18n]

  - file: build-commands.md
    title: Build, test, and screenshot commands
    description: Gradle commands for building and running tests; screenshot test setup (promo build type, prerequisites, Compose test timing pitfalls with AndroidView content); TestDataInteractor raw SQL must match current groups_table schema.
    keywords: [build, gradle, test, assembleDebug, commands, gradlew, testDebugUnitTest, screenshots, promo, playstore, frameit, fastlane, waitUntil, AndroidView, TestDataInteractor, groups_table]

  - file: component-types.md
    title: Component types — Trackers, Functions, Graphs, Reminders, Groups
    description: The 5 component types, their dual-ID pattern (primary key vs featureId), the unique field on DTOs for symlink detection (no default, must always be computed by querying group_items_table), GroupItemType vs GroupChildType enums, all three UI behaviors triggered by unique==false (icon, delete dialog with deleteEverywhere, symlinks menu).
    keywords: [tracker, function, graph, reminder, group, featureId, primaryKey, component, GroupItemType, GroupChildType, unique, symlink, dual-id, SymlinksDialog, context-menu, deleteEverywhere]

  - file: database-schema.md
    title: Database tables and relationships
    description: Room/SQLite schema — all core tables (groups, group_items, features, trackers, functions, graphs, reminders, data_points), their columns, and foreign key relationships.
    keywords: [database, schema, Room, SQLite, tables, columns, foreign-key, groups, features, trackers, functions, data_points, cascade]

  - file: database-migrations.md
    title: Writing Room database migrations
    description: How to write Room migrations safely — copy CREATE TABLE SQL from schema JSON (jq), SQLite table-rebuild pattern, DROP TABLE cascade pitfall, migration 58→59 (group_items_table introduction), and migration 59→60 (remove unique constraint to allow same-group duplicates).
    keywords: [migration, Room, SQLite, schema, ALTER, DROP, cascade, rebuild, jq, child_id, group_items, 59-60, unique-constraint]

  - file: group-hierarchy.md
    title: Group DAG structure and symlinks
    description: Groups form a DAG (not a tree) — a group can appear in multiple parent groups via symlinks; deletion handles shared membership; GroupGraph, FeaturePathProvider, and ComponentPathProvider resolve display paths (with .distinct() deduplication for same-group duplicates); DTOs never carry hierarchy info.
    keywords: [group, DAG, symlink, hierarchy, acyclic, parent, child, GroupGraph, FeaturePathProvider, ComponentPathProvider, deletion, path-resolution, SymlinksDialog]

  - file: group-items.md
    title: group_items_table — junction table and display ordering
    description: The group_items_table schema, composite identity (type + child_id), groupItemId as placement identity, display_index ordering, multi-group membership (including same-group duplicates, no unique constraint), symlink creation disabled-items pattern (AddSymlinkViewModel), drag-and-drop flow, and null group_id for groupless reminders.
    keywords: [group_items, junction, display_index, ordering, null, groupless, child_id, composite-identity, drag-and-drop, DAO, multi-group, symlink, AddSymlinkViewModel, disabled-items, SelectItemDialog, groupItemId, placement-identity]

  - file: helper-classes.md
    title: DataInteractor and Helper pattern
    description: DataInteractor public interface, DataInteractorImpl delegation to typed helpers, focused DAO interfaces, symlink-aware delete pattern (groupItemId + deleteEverywhere), duplicate pattern returning CreatedComponent, move pattern using groupItemId, performAtomicUpdate double-emission pitfall, withContext-inside-withTransaction pitfall, and DataUpdateType events.
    keywords: [DataInteractor, helper, DAO, TrackerHelper, FunctionHelper, GraphHelper, GroupHelper, ReminderHelper, delete, symlink, withTransaction, DataUpdateType, events, testing, fakes, DisplayIndex, groupItemId, deleteEverywhere, duplicate, move, CreatedComponent, performAtomicUpdate]

  - file: reminders.md
    title: Reminders — groupless reminders, scheduling, and display ordering
    description: Reminders can exist with null group_id (groupless), appearing only in the Reminders screen. Covers ReminderParams types, delete/duplicate behavior, KMP-compatible PlatformScheduler pattern, and RemindersScreenViewModel display ordering pitfall.
    keywords: [reminder, groupless, null, ReminderParams, PlatformScheduler, scheduling, delete, duplicate, display-index, RemindersScreenViewModel, DataUpdateType]

  - file: lua-architecture.md
    title: Lua functions — app architecture and data model
    description: Functions are derived data sources built in a visual node editor; covers FunctionGraph DTO, node types (FeatureNode, LuaScriptNode, OutputNode), 8 configuration value types, serialization pipeline, and LuaEngine execution flow with 4 modes.
    keywords: [lua, function, node-editor, FunctionGraph, LuaScriptNode, FeatureNode, OutputNode, configuration, serialization, LuaEngine, architecture, FunctionGraphSerializer]

  - file: lua-community-functions.md
    title: Writing Lua function scripts and contributing to the community catalog
    description: How to write Lua function scripts (generator/iterator pattern, data point fields, 8 config types, multiple inputs, filtering); catalog contribution requirements (version, 4-language localization, categories, tests).
    keywords: [lua, function, script, generator, iterator, datapoint, config, community, catalog, localization, tests, tng.config, inputCount, version]

  - file: lua-graph-scripts.md
    title: Writing Lua graph scripts and contributing graph scripts
    description: Graph scripts return graph data structures (not data streams); 5 graph types (text, data_point, line, time_bar, pie), DataSource API, script configuration with local variables, DURATION vs PERIOD distinction, and the graph test framework.
    keywords: [lua, graph, script, visualization, line, pie, bar, text, data_point, DataSource, DURATION, PERIOD, tests, tng.graph, community]

  - file: lua-tooling.md
    title: Lua tooling, build process, and adding new config types
    description: Directory structure for lua/, building the function catalog (pack-functions.lua), validation and inspection tools, debug publishing, and the 7 implementation + 5 test files to update when adding a new configuration type.
    keywords: [lua, tooling, build, pack-functions, catalog, luarocks, serpent, validation, config-types, debug-publish, api-specs]

  - file: remote-config-and-urls.md
    title: Remote configuration and URL navigation
    description: How external URLs are managed via remote config and opened from the app — UrlNavigator pattern, adding new URLs, and the multi-file update checklist.
    keywords: [RemoteConfiguration, UrlNavigator, Endpoints, remote-config, URL, navigate, triggerNavigation, browser, InfoDisplay]

  - file: release-changelogs.md
    title: Release changelogs — workflow, structure, and Play Store limits
    description: Dual changelog system (public markdown for in-app/website, fastlane .txt for Play Store), the make changelog lua workflow, Play Store 500-character limit, 4-language localization requirement, and index.json maintenance.
    keywords: [changelog, release, fastlane, play-store, make-changelog, localization, 500-char, index.json, versionCode, versionName]

